# =====================================================================
# CONFIGURACIÓN DE LA BASE DE DATOS EN MEMORIA (H2)
# =====================================================================

# Habilita la consola web de H2 para visualizar las tablas e insertar/consultar datos manualmente
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# URL de conexión persistente en memoria mientras el proceso esté activo
spring.datasource.url=jdbc:h2:mem:ecommercedb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# =====================================================================
# CONFIGURACIÓN DE JPA / HIBERNATE
# =====================================================================

# Hibernate creará las tablas automáticamente basándose en las clases @Entity
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =====================================================================
# INICIALIZACIÓN DE DATOS (data.sql)
# =====================================================================

# Indica a Spring Boot que ejecute el archivo 'data.sql' siempre al arrancar
spring.sql.init.mode=always

# CRUCIAL para Spring Boot 3+:
# Fuerza a que Hibernate cree primero las tablas antes de que se ejecuten los scripts 'data.sql'
spring.jpa.defer-datasource-initialization=true